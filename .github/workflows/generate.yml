name: Hourly Post Generation

on:
  schedule:
    # Hourly. Stagger minute across sister sites to avoid API spikes.
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: hourly-post-generation
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Run pipeline
        env:
          # Must match llm.apiKeyEnv / source config in src/site.config.ts
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}

          # Optional syndication targets
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          MASTODON_INSTANCE_URL: ${{ secrets.MASTODON_INSTANCE_URL }}
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
        run: npx tsx scripts/run-local.ts

      - name: Commit, push, and optionally trigger Vercel
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
          PRODUCTION_BRANCH: main
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "astrokobi-bot"
          git config user.email "bot@astrokobi.com"

          # Union merge driver for concurrent topic-log appends
          git config merge.topiclog.name "union topic log entries"
          git config merge.topiclog.driver "node scripts/merge-topic-log.mjs %O %A %B"

          git add content/
          if git diff --cached --quiet; then
            echo "No new post generated — nothing to commit."
            exit 0
          fi

          git commit -m "post: $(date -u +%Y-%m-%dT%H:00Z) hourly dispatch"

          branch="${GITHUB_REF_NAME:-main}"

          for attempt in 1 2 3 4 5; do
            if git push origin "HEAD:${branch}"; then
              echo "Pushed on attempt ${attempt}."

              if [[ -n "${VERCEL_DEPLOY_HOOK_URL:-}" && "${branch}" == "${PRODUCTION_BRANCH}" ]]; then
                echo "Triggering Vercel deploy hook..."
                if curl -fsS -m 30 --retry 3 -X POST "${VERCEL_DEPLOY_HOOK_URL}" >/dev/null; then
                  echo "Vercel redeploy triggered."
                else
                  echo "Vercel deploy hook call failed (non-fatal)." >&2
                fi
              elif [[ -n "${VERCEL_DEPLOY_HOOK_URL:-}" ]]; then
                echo "Skipping deploy hook — '${branch}' is not production (${PRODUCTION_BRANCH})."
              else
                echo "VERCEL_DEPLOY_HOOK_URL not set; relying on Vercel git auto-deploy."
              fi

              exit 0
            fi

            echo "Push rejected (attempt ${attempt}); rebasing onto origin/${branch} and retrying..."
            git fetch origin "${branch}"

            if ! git rebase "origin/${branch}"; then
              echo "Rebase did not complete cleanly; aborting this attempt." >&2
              git rebase --abort || true
            fi
          done

          echo "Failed to push after multiple attempts." >&2
          exit 1
