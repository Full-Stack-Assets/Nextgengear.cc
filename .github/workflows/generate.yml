name: Hourly Post Generation

on:
  schedule:
    # Hourly. GitHub may delay scheduled runs under load, so the actual tick can
    # drift a few minutes past the time. When running several sites that share an
    # LLM key/quota, give each a DIFFERENT minute so they don't all hit the API
    # at once (e.g. site 1 '0 * * * *', site 2 '12 * * * *', site 3 '24 …').
    - cron: '0 * * * *'
  workflow_dispatch: # manual trigger button in GitHub UI

# Don't let a slow run overlap the next hourly tick. Newer runs wait for the
# in-flight one rather than racing it to commit/push.
concurrency:
  group: hourly-post-generation
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run pipeline
        env:
          # LLM key — name must match `llm.apiKeyEnv` in src/site.config.ts.
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          # Syndication (optional) — any unset platform is skipped.
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          MASTODON_INSTANCE_URL: ${{ secrets.MASTODON_INSTANCE_URL }}
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
        run: npx tsx scripts/run-local.ts

      - name: Commit and push
        env:
          # Optional Vercel Deploy Hook URL (Vercel → Settings → Git → Deploy
          # Hooks). When set, a production redeploy is triggered after each new
          # post is pushed. Unset = skipped (relies on Vercel's git auto-deploy).
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
          # The deploy hook targets production; only fire it when pushing here.
          PRODUCTION_BRANCH: main
        run: |
          git config user.name "trendblog-bot"
          git config user.email "bot@trendblog.dev"

          # Register the union merge driver for content/.topic-log.json (mapped
          # in .gitattributes) so a rebase auto-merges concurrent appends to the
          # topic log instead of conflicting and failing the run.
          git config merge.topiclog.name "union topic log entries"
          git config merge.topiclog.driver "node scripts/merge-topic-log.mjs %O %A %B"

          git add content/
          if git diff --cached --quiet; then
            echo "No new post generated — nothing to commit."
            exit 0
          fi

          jobs:
  generate-post:
    runs-on: ubuntu-latest
    concurrency:
      group: hourly-post-generation-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ... your existing setup/build/generation steps ...

      - name: Commit and push generated post safely
        shell: bash
        run: |
          set -euo pipefail

          branch="${GITHUB_REF_NAME:-main}"

          # Always start from freshest remote tip to avoid stale-SHA rebases.
          git fetch origin "${branch}"
          git checkout -B "${branch}" "origin/${branch}"

          # Re-run generation here if needed, or ensure generation happened after checkout reset.
          # npm run generate:hourly

          # Stage ONLY generated artifacts that this workflow owns.
          # Adjust these paths to match your actual outputs.
          git add content/posts/

          # Optional: if you maintain a generated index/log, add it explicitly:
          # git add content/topic-log.json

          if git diff --cached --quiet; then
            echo "No new post generated — nothing to commit."
            exit 0
          fi

          # Guardrail: fail if anything outside owned paths changed.
          # This prevents accidental conflicts like SECURITY_REMEDIATION.md.
          if ! git diff --name-only | grep -E '^(content/posts/|content/topic-log\.json)$' >/dev/null 2>&1; then
            echo "Unexpected unstaged/staged changes detected outside generated paths:"
            git status --porcelain
            echo "Refusing to commit to avoid unrelated merge conflicts."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "post: $(date -u +%Y-%m-%dT%H:00Z) hourly dispatch"

          # Single push should now succeed because we rebased by reset to origin/<branch> first.
          git push origin "HEAD:${branch}"

      - name: Trigger Vercel deploy hook (non-fatal)
        if: ${{ env.VERCEL_DEPLOY_HOOK_URL != '' && github.ref_name == env.PRODUCTION_BRANCH }}
        shell: bash
        run: |
          if curl -fsS -m 30 --retry 3 -X POST "${VERCEL_DEPLOY_HOOK_URL}" > /dev/null; then
            echo "Vercel redeploy triggered."
          else
            echo "Vercel deploy hook call failed (non-fatal)." >&2
          fi
                  echo "Vercel redeploy triggered."
                else
                  echo "Vercel deploy hook call failed (non-fatal)." >&2
                fi
              elif [ -n "${VERCEL_DEPLOY_HOOK_URL}" ]; then
                echo "Skipping deploy hook — '${branch}' is not the production branch (${PRODUCTION_BRANCH})."
              else
                echo "VERCEL_DEPLOY_HOOK_URL not set; relying on Vercel git auto-deploy."
              fi
              exit 0
            fi
            echo "Push rejected (attempt ${attempt}); rebasing onto origin/${branch} and retrying..."
            git fetch origin "${branch}"
            if ! git rebase "origin/${branch}"; then
              echo "Rebase did not complete cleanly; aborting this attempt." >&2
              git rebase --abort || true
            fi
          done

          echo "Failed to push after multiple attempts." >&2
          exit 1
